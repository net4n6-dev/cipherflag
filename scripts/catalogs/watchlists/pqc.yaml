# PQC catalog watchlist for scripts/catalogs/refresh-pqc.go.
#
# The generator merges:
#  - NIST FIPS 203/204/205 (hardcoded in refresh-pqc.go)
#  - IETF hybrid draft variants (hardcoded in refresh-pqc.go)
#  - `overrides:` below (re-classify any of the above)
#  - `classical:` below (algorithms not in PQC registries — preserved verbatim)
#  - `synonyms:` below (alternative spellings)
#
# Stale-entry policy: an entry in upstream that disappears between
# refreshes is REMOVED. To preserve a historical entry, add it under
# `classical:` or `overrides:`.

overrides:
  - canonical: falcon-512
    status: QuantumSafe
    category: pqc-sig
    source: "https://falcon-sign.info/"
  - canonical: falcon-1024
    status: QuantumSafe
    category: pqc-sig
    source: "https://falcon-sign.info/"

