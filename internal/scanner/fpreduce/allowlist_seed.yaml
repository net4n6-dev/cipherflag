# Curated benign-artifact allow-list for CipherFlag container scanner.
#
# v1 seed is intentionally EMPTY. Pre-GA roadmap entry tracks curation
# for the top ~200 public base images (debian / ubuntu / alpine / node /
# python / golang / chainguard / wolfi derivatives). See docs/roadmap.md.
#
# Entry format:
#   - image_digest: sha256:<hex>  # the image digest this entry applies to
#     path: <file path inside the image>
#     sha256: sha256:<hex>        # blob SHA-256
#     comment: <free-form note for curators>
#
# Multiple image_digest values can pin a known-benign artifact across
# image variants (e.g. amd64 + arm64 digests of the same image release).

# (no entries — v1 seed)
