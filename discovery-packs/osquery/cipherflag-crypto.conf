{
  "queries": {
    "cipherflag_certificates": {
      "query": "SELECT common_name, issuer, key_algorithm, key_strength, sha256_fingerprint, not_valid_after, not_valid_before, signing_algorithm, subject, authority_key_id, path FROM certificates;",
      "interval": 3600,
      "description": "Discover all certificates in OS certificate stores",
      "snapshot": true
    },
    "cipherflag_ssh_user_keys": {
      "query": "SELECT uid, path, encrypted, key_type FROM user_ssh_keys;",
      "interval": 3600,
      "description": "Discover SSH keys for all users",
      "snapshot": true
    },
    "cipherflag_authorized_keys": {
      "query": "SELECT uid, key, key_type, comment FROM authorized_keys;",
      "interval": 3600,
      "description": "Discover authorized_keys entries",
      "snapshot": true
    },
    "cipherflag_crypto_packages_deb": {
      "query": "SELECT name, version, source FROM deb_packages WHERE name IN ('openssl','libssl3','libssl1.1','libgnutls30','libnss3','libgcrypt20','libsodium23','libwolfssl-dev');",
      "interval": 86400,
      "description": "Crypto library packages (Debian/Ubuntu)",
      "snapshot": true
    },
    "cipherflag_crypto_packages_rpm": {
      "query": "SELECT name, version, release FROM rpm_packages WHERE name IN ('openssl','openssl-libs','gnutls','nss','libgcrypt','libsodium','wolfssl');",
      "interval": 86400,
      "description": "Crypto library packages (RHEL/CentOS)",
      "snapshot": true
    }
  }
}
