# CipherFlag Configuration — Docker deployment
# Copy to config/cipherflag.toml or mount as volume

[server]
listen = "0.0.0.0:8443"

[storage]
postgres_url = "postgres://cipherflag:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cipherflag?sslmode=disable"

[analysis]
recheck_interval_hours = 6
expiry_warning_days = [30, 60, 90, 180]

[analysis.protocol_policy]
min_tls_version = "1.2"
require_forward_secrecy = true
require_aead = true
banned_ciphers = ["RC4", "DES", "3DES", "NULL", "EXPORT"]

[sources.zeek_file]
enabled = true
log_dir = "/zeek-logs"
poll_interval_seconds = 30

[sources.corelight]
enabled = false

[export.venafi]
enabled = false
platform = "cloud"
api_key = ""
region = "us"
push_interval_minutes = 60

[pcap]
max_file_size_mb = 500
retention_hours = 24
input_dir = "/pcap-input"
