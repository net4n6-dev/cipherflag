name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push CipherFlag image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/net4n6-dev/cipherflag:latest
            ghcr.io/net4n6-dev/cipherflag:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Zeek image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/zeek
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/net4n6-dev/cipherflag-zeek:latest
            ghcr.io/net4n6-dev/cipherflag-zeek:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binary:
    name: Build CLI binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend and stage for embed
        run: |
          # The CLI binary embeds the SPA via //go:embed all:dist in
          # internal/web. Build the static frontend and copy it into the
          # embed dir BEFORE `go build`, mirroring the Dockerfile go-builder
          # stage — otherwise the binary ships the placeholder index.html
          # and `GET /` serves "frontend not built" instead of the UI.
          cd frontend
          npm ci
          npm run build
          cd ..
          rm -rf internal/web/dist
          mkdir -p internal/web/dist
          cp -r frontend/build/. internal/web/dist/
          # Fail loudly if the real build did not land (guards against a
          # silent regression that would re-ship the placeholder).
          test -f internal/web/dist/index.html
          grep -q '/_app/' internal/web/dist/index.html

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o cipherflag-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/cipherflag/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cipherflag-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cipherflag-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create GitHub Release
    needs: [docker, binary]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/cipherflag-*/*
          generate_release_notes: true
