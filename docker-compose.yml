#
# CipherFlag CE smoke-deploy compose.
#
# Brings up:
#   - postgres:16          (data store)
#   - cipherflag           (HTTP API server on :8080)
#
# EE-only services NOT included:
#   - The container-image scanner binary (Layer 6.2 EE)
#   - Velociraptor / Wazuh / Defender / SentinelOne / Tanium / Absolute /
#     Netwrix sidecars (Layer 3 EE adapters)

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cipherflag
      POSTGRES_USER: cipherflag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cipherflag"]
      interval: 5s
      timeout: 5s
      retries: 5

  cipherflag:
    build:
      context: .
    image: ghcr.io/net4n6-dev/cipherflag:latest
    environment:
      CIPHERFLAG_CONFIG: /app/config/cipherflag.toml
    ports:
      - "8443:8443"
    volumes:
      - ./config:/app/config
      # Mount a working directory for the git repo scanner clone cache.
      - scanner-clones:/var/cache/cipherflag/scanner/clones
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data:
  scanner-clones:
